name: Pipeline CI - Sistema de Doacoes

# Define que o pipeline vai rodar sempre que houver um push na branch main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # O pipeline vai rodar numa máquina virtual com a versão mais recente do Ubuntu
    runs-on: ubuntu-latest

    steps:
    # 1. Faz o checkout do código (baixa os ficheiros do repositório para a máquina virtual)
    - name: Checkout do codigo
      uses: actions/checkout@v3

    # 2. Configura o ambiente instalando o Python
    - name: Configurar ambiente Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 3. Instala as dependências definidas no requirements.txt e o flake8 (etapa extra)
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    # 4. ETAPA EXTRA: Análise estática do código para encontrar erros de sintaxe
    # Usamos o --ignore para que ele não reprove o pipeline por causa de espaços em branco simples
    - name: Analise estatica (Linting) com Flake8
      run: |
        flake8 api/ --ignore=E302,E305,W292,W293,E501

    # 5. Executa os testes unitários desenvolvidos na Etapa 1
    - name: Executar testes unitarios
      run: |
        python -m pytest api/tests/